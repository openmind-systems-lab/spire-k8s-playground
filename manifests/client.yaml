apiVersion: v1
kind: Pod
metadata:
  name: client
  namespace: spire-playground
spec:
  serviceAccountName: client

  volumes:
    - name: spiffe-workload-api
      csi:
        driver: csi.spiffe.io
        readOnly: true

  containers:
    - name: client
      image: busybox
      command: ['sleep', '3600']

      volumeMounts:
        - name: spiffe-workload-api
          mountPath: /spiffe-workload-api
          readOnly: true